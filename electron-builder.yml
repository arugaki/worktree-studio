appId: com.worktreestudio.app
productName: Worktree Studio
# 已通过 prebuild-install 拿到匹配 Electron ABI 的预编译二进制,禁止从源码重建
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
# node-pty 的原生 .node 与 conpty.dll 不能被打进 asar,必须解包
asarUnpack:
  - "**/node_modules/@homebridge/node-pty-prebuilt-multiarch/**"
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
